<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TW DB</title>
    <link rel="stylesheet" href="./assets/styles.css?v=20260716-relic-msg" />
  </head>
  <body>
    <main class="app-shell">
      <nav class="top-tabs" aria-label="상단 메뉴">
        <button class="tab-button is-active" type="button" data-main-tab="equipment" aria-controls="equipmentView" aria-current="page">장비 검색</button>
        <button class="tab-button" type="button" data-main-tab="calculator" aria-controls="calculatorView">계산기</button>
        <button class="tab-button" type="button" data-main-tab="simulator" aria-controls="simulatorView">시뮬레이터</button>
        <button class="tab-button" type="button" data-main-tab="extra" aria-controls="extraView">추가 메뉴</button>
      </nav>

      <section id="equipmentView" class="main-panel is-active" data-main-panel="equipment">
        <section class="toolbar" aria-label="장비 검색 조건">
          <div class="brand-block">
            <p class="eyebrow">TW DB</p>
            <h1>장비 검색</h1>
          </div>

          <div class="control-grid">
            <label class="field">
              <span>카테고리</span>
              <select id="categorySelect"></select>
            </label>
            <label class="field">
              <span>분류</span>
              <select id="typeSelect"></select>
            </label>
            <label class="field search-field">
              <span>검색</span>
              <input id="searchInput" type="search" placeholder="장비명, 재료, 캐릭터" autocomplete="off" />
            </label>
          </div>
        </section>

        <section class="result-band" aria-live="polite">
          <div class="result-meta">
            <strong id="resultCount">0개</strong>
            <span id="dataStatus">데이터 준비 중</span>
          </div>

          <div class="pager">
            <button id="prevButton" type="button" class="icon-button" aria-label="이전 장비">‹</button>
            <span id="pageLabel">0 / 0</span>
            <button id="nextButton" type="button" class="icon-button" aria-label="다음 장비">›</button>
          </div>
        </section>

        <section class="workspace">
          <article id="equipmentCard" class="equipment-card"></article>

          <aside class="compare-panel" aria-label="장비 비교">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Compare</p>
                <h2>장비 비교</h2>
              </div>
              <label class="limit-toggle">
                <input id="limitCompareToggle" type="checkbox" />
                <span>한계작 비교</span>
              </label>
            </div>

            <label class="field">
              <span>비교 장비</span>
              <select id="compareSelect"></select>
            </label>

            <div id="compareSummary" class="compare-summary"></div>
          </aside>
        </section>
      </section>

      <section id="calculatorView" class="main-panel addon-view" data-main-panel="calculator" hidden>
        <div class="addon-titlebar">
          <div class="brand-block">
            <p class="eyebrow">TW DB</p>
            <h1>계산기</h1>
          </div>
          <div class="addon-tab-field">
            <span>계산기 메뉴</span>
            <nav class="addon-subtabs" aria-label="계산기 메뉴">
              <button class="addon-tab is-active" type="button" data-calculator-tab="coefficient">계수 계산기</button>
              <button class="addon-tab" type="button" data-calculator-tab="damage">대미지 계산기</button>
            </nav>
          </div>
        </div>

        <div class="addon-window">
          <section class="addon-content is-active" data-calculator-panel="coefficient">
            <div id="coefficientSelectView" class="coefficient-select">
              <div id="characterGrid" class="character-grid" aria-label="계수 계산기 캐릭터 선택"></div>
            </div>

            <div id="coefficientDetailView" class="coefficient-detail" hidden>
              <div class="coefficient-detail-header">
                <button id="coefficientBackButton" class="ghost-button" type="button">← 뒤로</button>
                <div class="coefficient-selected">
                  <img id="coefficientSelectedImage" src="" alt="" />
                  <strong id="coefficientSelectedName">나야트레이</strong>
                </div>
                <button id="coefficientResetButton" class="ghost-button reset-button" type="button">↺ 초기화</button>
                <label class="dark-field">
                  <span>계산 타입</span>
                  <select id="coefficientTypeSelect"></select>
                </label>
              </div>

              <div class="coefficient-grid">
                <div class="coefficient-table-card">
                  <table class="coefficient-table" aria-label="부위별 계수 입력 테이블">
                    <thead>
                      <tr id="coefficientTableHead"></tr>
                    </thead>
                    <tbody id="coefficientTableBody"></tbody>
                  </table>
                  <div id="coefficientMainTotal" class="coefficient-maintotal" aria-label="합계"></div>
                </div>

                <aside class="coefficient-side">
                  <table class="side-score-table" aria-label="보조 계수 입력">
                    <thead>
                      <tr>
                        <th></th>
                        <th>명중</th>
                        <th id="sideHeadPrimary">주스탯</th>
                        <th id="sideHeadSecondary">부스탯</th>
                        <th>계수</th>
                      </tr>
                    </thead>
                    <tbody id="coefficientSideBody"></tbody>
                  </table>
                  <label class="toggle-row">
                    <span>아바타 강화(주스탯)</span>
                    <input id="avatarMainEnhance" type="checkbox" />
                  </label>
                  <label class="toggle-row">
                    <span>아바타 강화(부스탯)</span>
                    <input id="avatarSubEnhance" type="checkbox" />
                  </label>
                </aside>
              </div>

              <div id="coefficientContentSummary" class="coefficient-summary"></div>
            </div>
          </section>

          <section class="addon-content" data-calculator-panel="damage" hidden>
            <div class="coming-soon">준비중</div>
          </section>
        </div>
      </section>

      <section id="simulatorView" class="main-panel addon-view" data-main-panel="simulator" hidden>
        <div class="addon-titlebar">
          <div class="brand-block">
            <p class="eyebrow">TW DB</p>
            <h1>시뮬레이터</h1>
          </div>
          <div class="addon-tab-field">
            <span>시뮬레이터 메뉴</span>
            <nav class="addon-subtabs" aria-label="시뮬레이터 메뉴">
              <button class="addon-tab is-active" type="button" data-simulator-tab="encrypt">인크립트</button>
              <button class="addon-tab" type="button" data-simulator-tab="core">코어 강화</button>
              <button class="addon-tab" type="button" data-simulator-tab="relic">신조 렐릭</button>
            </nav>
          </div>
        </div>

        <div class="addon-window">
          <section class="addon-content is-active sim-panel" data-simulator-panel="encrypt">
            <div class="sim-grid">
              <div class="sim-controls">
                <div class="sim-row">
                  <label class="sim-radio"><input type="radio" name="encInkType" value="vianu" checked /><span>비아누</span></label>
                  <label class="sim-radio"><input type="radio" name="encInkType" value="eta" /><span>에타</span></label>
                  <label class="sim-check"><input id="encElso" type="checkbox" /><span>엘소</span></label>
                  <label class="sim-check"><input id="encDiscount" type="checkbox" /><span>20% 할인</span></label>
                </div>
                <div id="encPresets" class="sim-presets"></div>
                <div class="sim-fields">
                  <label class="field"><span id="encCostLabel">1회 비용 (만원)</span><input id="encBaseCost" type="text" value="666" /></label>
                  <label class="field"><span>현재 인크립트</span><input id="encStartInk" type="number" value="0" /></label>
                  <label class="field"><span>목표 인크립트</span><input id="encTargetInk" type="number" value="10" /></label>
                  <label class="field"><span>수동 횟수</span><input id="encManualCount" type="number" value="100" /></label>
                </div>
                <div class="sim-buttons">
                  <button id="encRunBatch" class="sim-btn" type="button">수동 인크립트</button>
                  <button id="encRunTarget" class="sim-btn primary" type="button">자동 인크립트</button>
                  <button id="encReset" class="sim-btn danger" type="button">리셋</button>
                </div>
                <div id="encStatus" class="sim-status"></div>
              </div>
              <div id="encLog" class="sim-log" aria-label="인크립트 로그"></div>
            </div>
          </section>

          <section class="addon-content sim-panel" data-simulator-panel="core" hidden>
            <div class="sim-controls">
              <div class="sim-row">
                <label class="sim-radio"><input type="radio" name="coreType" value="abyss" checked /><span>머큐리얼/어비스</span></label>
                <label class="sim-radio"><input type="radio" name="coreType" value="normal" /><span>이클립스/루비코나</span></label>
                <label class="sim-check"><input id="coreMainStat" type="checkbox" checked /><span>주스탯</span></label>
                <label class="sim-check"><input id="coreHasDust" type="checkbox" /><span>가루 보유</span></label>
              </div>
              <div class="sim-fields">
                <label class="field"><span>시작 단계</span><select id="coreStartStage"></select></label>
                <label class="field"><span>목표 단계</span><select id="coreTargetStage"></select></label>
                <label class="field" id="coreBoxPriceField"><span>상자 가격 (만원)</span><input id="coreBoxPrice" type="text" value="0" /></label>
              </div>
              <div class="sim-buttons">
                <button id="coreCalc" class="sim-btn primary" type="button">기대값 계산</button>
              </div>
            </div>
            <div id="coreSummary" class="sim-summary"></div>
            <div class="sim-table-wrap"><table id="coreTable" class="sim-table"></table></div>
          </section>

          <section class="addon-content sim-panel" data-simulator-panel="relic" hidden>
            <div class="sim-controls">
              <div class="sim-row">
                <label class="sim-radio"><input type="radio" name="relicType" value="pendant" checked /><span>펜던트</span></label>
                <label class="sim-radio"><input type="radio" name="relicType" value="bracelet" /><span>브레이슬릿</span></label>
              </div>
              <div class="sim-fields">
                <label class="field"><span>현재 레벨 (0~19)</span><input id="relicCurrent" type="number" value="0" /></label>
                <label class="field"><span>목표 레벨 (1~20)</span><input id="relicTarget" type="number" value="20" /></label>
                <label class="field"><span>강화 가능 단수 (1~20)</span><input id="relicDifficulty" type="number" value="20" /></label>
              </div>
              <div class="sim-buttons">
                <button id="relicCalc" class="sim-btn primary" type="button">기대값 계산</button>
              </div>
            </div>
            <div id="relicSummary" class="sim-summary"></div>
            <div class="sim-table-wrap"><table id="relicTable" class="sim-table"></table></div>
          </section>
        </div>
      </section>

      <section id="extraView" class="main-panel placeholder-view" data-main-panel="extra" hidden>
        <div class="coming-soon">준비중</div>
      </section>
    </main>

    <template id="emptyTemplate">
      <div class="empty-state">
        <strong>검색 결과가 없습니다</strong>
        <span>조건을 조금 넓혀보세요.</span>
      </div>
    </template>

    <script src="./assets/app.js?v=20260716-relic-msg" type="module"></script>
  </body>
</html>
